<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter-Strike Clone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#blocker {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 100;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}

#menu {
  text-align: center; color: #fff;
}

#menu h1 {
  font-size: 64px; color: #ff6600;
  text-shadow: 0 0 20px rgba(255,102,0,0.5);
  margin-bottom: 10px; letter-spacing: 4px;
}

#menu h2 {
  font-size: 18px; color: #aaa; margin-bottom: 40px; font-weight: normal;
}

#menu .start-btn {
  padding: 15px 50px; font-size: 22px; background: #ff6600;
  border: none; color: #fff; cursor: pointer; border-radius: 4px;
  transition: all 0.3s; letter-spacing: 2px;
}

#menu .start-btn:hover { background: #ff8833; transform: scale(1.05); }

#menu .controls {
  margin-top: 40px; color: #888; font-size: 14px; line-height: 2;
}

#menu .controls span { color: #ff6600; font-weight: bold; }

#hud {
  position: fixed; bottom: 0; left: 0; width: 100%; z-index: 50;
  pointer-events: none; padding: 20px;
}

#health-bar-container {
  position: fixed; bottom: 20px; left: 20px;
  display: flex; align-items: center; gap: 10px;
}

#health-icon { font-size: 28px; }
#health-bar {
  width: 200px; height: 8px; background: rgba(255,255,255,0.1);
  border-radius: 4px; overflow: hidden;
}
#health-fill {
  width: 100%; height: 100%; background: linear-gradient(90deg, #00ff44, #44ff88);
  border-radius: 4px; transition: width 0.3s;
}
#health-text {
  color: #fff; font-size: 24px; font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

#armor-bar-container {
  position: fixed; bottom: 50px; left: 20px;
  display: flex; align-items: center; gap: 10px;
}
#armor-bar {
  width: 200px; height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 4px; overflow: hidden;
}
#armor-fill {
  width: 100%; height: 100%; background: linear-gradient(90deg, #0088ff, #44aaff);
  border-radius: 4px; transition: width 0.3s;
}
#armor-text {
  color: #88bbff; font-size: 18px; font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

#ammo-display {
  position: fixed; bottom: 20px; right: 20px;
  color: #fff; font-size: 36px; font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}
#ammo-display .ammo-reserve { font-size: 20px; color: #aaa; }

#crosshair {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 50; pointer-events: none;
}
.ch-line {
  position: absolute; background: rgba(0,255,100,0.9);
}
.ch-top { width: 2px; height: 12px; left: -1px; top: -18px; }
.ch-bottom { width: 2px; height: 12px; left: -1px; top: 6px; }
.ch-left { width: 12px; height: 2px; top: -1px; left: -18px; }
.ch-right { width: 12px; height: 2px; top: -1px; left: 6px; }

#score-display {
  position: fixed; top: 20px; right: 20px;
  color: #fff; font-size: 16px; text-align: right;
  text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 50;
}

#kill-feed {
  position: fixed; top: 20px; left: 20px;
  color: #fff; font-size: 14px; z-index: 50;
}
.kill-entry {
  background: rgba(0,0,0,0.5); padding: 4px 10px;
  margin-bottom: 3px; border-radius: 3px;
  animation: fadeOut 4s forwards; border-left: 3px solid #ff6600;
}
@keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

#weapon-name {
  position: fixed; bottom: 55px; right: 20px;
  color: #aaa; font-size: 13px; text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

#round-display {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font-size: 48px; font-weight: bold; z-index: 60;
  text-shadow: 0 0 20px rgba(255,102,0,0.8);
  opacity: 0; transition: opacity 0.5s; pointer-events: none;
}

#damage-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 40;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
  opacity: 0; transition: opacity 0.2s;
}

#hit-marker {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 55; opacity: 0;
}
.hm-line {
  position: absolute; background: #fff;
}
.hm-1 { width: 2px; height: 10px; transform: rotate(45deg); left: -8px; top: -8px; }
.hm-2 { width: 2px; height: 10px; transform: rotate(-45deg); left: 6px; top: -8px; }
.hm-3 { width: 2px; height: 10px; transform: rotate(45deg); left: 6px; top: 2px; }
.hm-4 { width: 2px; height: 10px; transform: rotate(-45deg); left: -8px; top: 2px; }

#minimap {
  position: fixed; top: 60px; left: 20px; z-index: 50;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
  background: rgba(0,0,0,0.5);
}

#death-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(139,0,0,0.5); z-index: 80;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; color: #fff;
}
#death-screen h2 { font-size: 48px; margin-bottom: 20px; }
#death-screen p { font-size: 18px; color: #ddd; }

#weapon-switch {
  position: fixed; bottom: 100px; right: 20px;
  color: #888; font-size: 12px; z-index: 50;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<div id="blocker">
  <div id="menu">
    <h1>COUNTER-OPS</h1>
    <h2>TACTICAL SHOOTER</h2>
    <button class="start-btn" onclick="startGame()">PLAY</button>
    <div class="controls">
      <span>WASD</span> Move &nbsp;|&nbsp; <span>MOUSE</span> Aim &nbsp;|&nbsp; <span>CLICK</span> Shoot<br>
      <span>R</span> Reload &nbsp;|&nbsp; <span>SHIFT</span> Sprint &nbsp;|&nbsp; <span>SPACE</span> Jump<br>
      <span>1/2</span> Switch Weapon &nbsp;|&nbsp; <span>ESC</span> Pause
    </div>
  </div>
</div>

<div id="crosshair">
  <div class="ch-line ch-top"></div>
  <div class="ch-line ch-bottom"></div>
  <div class="ch-line ch-left"></div>
  <div class="ch-line ch-right"></div>
</div>

<div id="hud">
  <div id="armor-bar-container">
    <div id="armor-bar"><div id="armor-fill"></div></div>
    <span id="armor-text">100</span>
  </div>
  <div id="health-bar-container">
    <span id="health-text">100</span>
    <div id="health-bar"><div id="health-fill"></div></div>
  </div>
</div>

<div id="ammo-display">
  <span id="ammo-current">30</span> / <span class="ammo-reserve" id="ammo-reserve">90</span>
</div>
<div id="weapon-name">AK-47</div>
<div id="weapon-switch">1 - AK-47 &nbsp; 2 - Pistol</div>

<div id="score-display">
  <div>KILLS: <span id="kills">0</span></div>
  <div>DEATHS: <span id="deaths">0</span></div>
  <div>ROUND: <span id="round">1</span></div>
</div>

<div id="kill-feed"></div>
<div id="round-display"></div>
<div id="damage-overlay"></div>

<div id="hit-marker">
  <div class="hm-line hm-1"></div>
  <div class="hm-line hm-2"></div>
  <div class="hm-line hm-3"></div>
  <div class="hm-line hm-4"></div>
</div>

<canvas id="minimap" width="150" height="150"></canvas>

<div id="death-screen">
  <h2>YOU DIED</h2>
  <p>Respawning in 3 seconds...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  COUNTER-OPS — A CS-Style FPS
// ============================================================

// --- AUDIO ENGINE (Web Audio API) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  audioCtx = new AudioCtx();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);

  if (type === 'shoot') {
    const o = audioCtx.createOscillator();
    const n = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
    n.buffer = buf;
    n.connect(g);
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    n.start(now);
    n.stop(now + 0.1);
  } else if (type === 'pistol') {
    const n = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 5);
    n.buffer = buf;
    n.connect(g);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    n.start(now);
    n.stop(now + 0.08);
  } else if (type === 'hit') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(800, now);
    o.frequency.exponentialRampToValueAtTime(200, now + 0.1);
    o.connect(g);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    o.start(now);
    o.stop(now + 0.1);
  } else if (type === 'kill') {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(600, now);
    o.frequency.setValueAtTime(800, now + 0.05);
    o.connect(g);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.start(now);
    o.stop(now + 0.15);
  } else if (type === 'reload') {
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(300, now);
    o.frequency.setValueAtTime(500, now + 0.1);
    o.frequency.setValueAtTime(300, now + 0.2);
    o.connect(g);
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    o.start(now);
    o.stop(now + 0.3);
  } else if (type === 'damage') {
    const n = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
    n.buffer = buf;
    n.connect(g);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    n.start(now);
    n.stop(now + 0.15);
  } else if (type === 'step') {
    const n = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.2 * Math.pow(1 - i / d.length, 2);
    n.buffer = buf;
    n.connect(g);
    g.gain.setValueAtTime(0.05, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    n.start(now);
    n.stop(now + 0.05);
  }
}

// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4a85c5);
scene.fog = new THREE.FogExp2(0x87aed6, 0.007);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Lighting
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.5);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xFFF8E0, 1.1);
dirLight.position.set(50, 80, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -80;
dirLight.shadow.camera.right = 80;
dirLight.shadow.camera.top = 80;
dirLight.shadow.camera.bottom = -80;
scene.add(dirLight);

// Fill light (sky bounce)
const fillLight = new THREE.DirectionalLight(0xC0D8FF, 0.3);
fillLight.position.set(-30, 20, -40);
scene.add(fillLight);

// --- TEXTURES ---
function createTexture(width, height, drawFn) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, width, height);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const groundTex = createTexture(512, 512, (ctx, w, h) => {
  ctx.fillStyle = '#5A5A50';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 14000; i++) {
    const g = 65 + Math.random() * 55;
    ctx.fillStyle = `rgba(${g},${g},${g-5},0.35)`;
    ctx.fillRect(Math.random()*w, Math.random()*h, Math.random()*3+1, Math.random()*3+1);
  }
  // Subtle cracks
  ctx.strokeStyle = 'rgba(20,20,20,0.22)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 14; i++) {
    ctx.beginPath();
    let cx = Math.random()*w, cy = Math.random()*h;
    ctx.moveTo(cx, cy);
    for (let j = 0; j < 5; j++) {
      cx += (Math.random()-0.5)*38;
      cy += (Math.random()-0.5)*38;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 2;
  for (let x = 0; x <= w; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = 0; y <= h; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
});
groundTex.repeat.set(24, 24);

const wallTex = createTexture(256, 256, (ctx, w, h) => {
  ctx.fillStyle = '#9A8272';
  ctx.fillRect(0, 0, w, h);
  const bH = 24, bW = 56;
  for (let row = 0; row * bH < h; row++) {
    const off = (row % 2) * (bW / 2);
    for (let col = -1; col * bW < w + bW; col++) {
      const bx = col * bW + off;
      const by = row * bH;
      const r = Math.round(155 + Math.random()*35);
      const g = Math.round(115 + Math.random()*30);
      const b = Math.round(85 + Math.random()*25);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(bx + 2, by + 2, bW - 4, bH - 4);
    }
  }
  for (let i = 0; i < 1200; i++) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.07})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
  }
});

const crateTex = createTexture(256, 256, (ctx, w, h) => {
  ctx.fillStyle = '#7A5C18';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 28; i++) {
    ctx.strokeStyle = `rgba(${50+Math.random()*50},${30+Math.random()*30},${5+Math.random()*15},0.28)`;
    ctx.lineWidth = 1 + Math.random();
    ctx.beginPath();
    const sy = Math.random()*h;
    ctx.moveTo(0, sy);
    ctx.bezierCurveTo(w*0.33, sy+(Math.random()-0.5)*22, w*0.66, sy+(Math.random()-0.5)*22, w, sy+(Math.random()-0.5)*16);
    ctx.stroke();
  }
  ctx.strokeStyle = '#3A2A08';
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, w-8, h-8);
  ctx.strokeStyle = '#5A3E0A';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(4,4); ctx.lineTo(w-4,h-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w-4,4); ctx.lineTo(4,h-4); ctx.stroke();
  ctx.strokeRect(20, 20, w-40, h-40);
});

// --- MAP BUILDING ---
const mapWalls = []; // collision boxes
const MAP_SIZE = 80;

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(MAP_SIZE * 2, MAP_SIZE * 2),
  new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95, metalness: 0.0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Wall builder
function addWall(x, z, w, h, d, color) {
  const mat = new THREE.MeshStandardMaterial({ map: wallTex, color: color || 0xccbbaa, roughness: 0.88, metalness: 0.0 });
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  mapWalls.push({ mesh, x, z, hw: w/2, hd: d/2, h });
  return mesh;
}

function addCrate(x, z, size) {
  size = size || 2;
  const mat = new THREE.MeshStandardMaterial({ map: crateTex, roughness: 0.75, metalness: 0.05 });
  const geo = new THREE.BoxGeometry(size, size, size);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, size / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  mapWalls.push({ mesh, x, z, hw: size/2, hd: size/2, h: size });
  return mesh;
}

// Boundary walls
addWall(0, -MAP_SIZE, MAP_SIZE*2, 8, 2, 0xaa9988);
addWall(0, MAP_SIZE, MAP_SIZE*2, 8, 2, 0xaa9988);
addWall(-MAP_SIZE, 0, 2, 8, MAP_SIZE*2, 0xaa9988);
addWall(MAP_SIZE, 0, 2, 8, MAP_SIZE*2, 0xaa9988);

// --- CS-style map layout ---
// Center building
addWall(0, 0, 16, 6, 2);
addWall(0, -8, 16, 6, 2);
addWall(-7, -4, 2, 6, 10);
addWall(7, -4, 2, 6, 10);

// A Site area
addWall(-30, -30, 20, 5, 2);
addWall(-40, -20, 2, 5, 22);
addWall(-20, -20, 2, 5, 22);
addCrate(-30, -25, 2.5);
addCrate(-27, -25, 2.5);
addCrate(-28.5, -25, 2.5);
addCrate(-30, -22, 2);

// B Site area
addWall(30, 30, 20, 5, 2);
addWall(20, 20, 2, 5, 22);
addWall(40, 20, 2, 5, 22);
addCrate(30, 25, 2.5);
addCrate(33, 25, 2.5);
addCrate(31.5, 27.5, 2.5);

// Mid corridors
addWall(-5, -25, 2, 5, 20);
addWall(5, -25, 2, 5, 20);
addWall(-5, 25, 2, 5, 20);
addWall(5, 25, 2, 5, 20);

// Side buildings
addWall(-40, 10, 12, 5, 2);
addWall(-40, 0, 12, 5, 2);
addWall(-46, 5, 2, 5, 12);
addWall(-34, 3, 2, 5, 6);

addWall(40, -10, 12, 5, 2);
addWall(40, 0, 12, 5, 2);
addWall(46, -5, 2, 5, 12);
addWall(34, -3, 2, 5, 6);

// Cover crates scattered around
addCrate(-15, 15, 2);
addCrate(-15, 17, 2);
addCrate(15, -15, 2);
addCrate(15, -17, 2);
addCrate(0, 40, 3);
addCrate(0, -40, 3);
addCrate(-50, -50, 2);
addCrate(50, 50, 2);
addCrate(-50, 50, 2);
addCrate(50, -50, 2);
addCrate(25, 0, 2);
addCrate(-25, 0, 2);
addCrate(10, 10, 1.5);
addCrate(-10, -10, 1.5);

// Additional structures
addWall(-55, -40, 8, 4, 8, 0xbbaa99);
addWall(55, 40, 8, 4, 8, 0xbbaa99);
addWall(-55, 40, 10, 4, 2, 0xbbaa99);
addWall(55, -40, 10, 4, 2, 0xbbaa99);

// Ramps / elevated positions
const rampGeo = new THREE.BoxGeometry(6, 0.5, 6);
const rampMat = new THREE.MeshStandardMaterial({ color: 0x888877, roughness: 0.9, metalness: 0.0 });
const ramp1 = new THREE.Mesh(rampGeo, rampMat);
ramp1.position.set(-30, 0.25, 10);
ramp1.receiveShadow = true;
scene.add(ramp1);

const ramp2 = new THREE.Mesh(rampGeo, rampMat);
ramp2.position.set(30, 0.25, -10);
ramp2.receiveShadow = true;
scene.add(ramp2);

// --- ENVIRONMENT DECORATION ---

// Outer grass ground
const outerGround = new THREE.Mesh(
  new THREE.PlaneGeometry(700, 700),
  new THREE.MeshStandardMaterial({ color: 0x4A6030, roughness: 1.0 })
);
outerGround.rotation.x = -Math.PI / 2;
outerGround.position.y = -0.05;
outerGround.receiveShadow = true;
scene.add(outerGround);

// Trees
function addTree(x, z) {
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4A2E08, roughness: 0.95 });

// --- PARTICLES ---
const particles = [];

function createParticles(position, color, count) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.03 + Math.random() * 0.03, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    scene.add(mesh);
    particles.push({
      mesh, life: 1,
      vx: (Math.random() - 0.5) * 0.15,
      vy: Math.random() * 0.15,
      vz: (Math.random() - 0.5) * 0.15
    });
  }
}

function createBulletTrail(start, end) {
  const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
  const mat = new THREE.LineBasicMaterial({ color: 0xffff88, transparent: true, opacity: 0.5 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  particles.push({ mesh: line, life: 0.3, vx: 0, vy: 0, vz: 0, isTrail: true });
}

const keys = {};
let mouseX = 0, mouseY = 0;
let yaw = 0, pitch = 0;
let isLocked = false;
let canShootFlag = true;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Digit1') switchWeapon('ak47');
  if (e.code === 'Digit2') switchWeapon('pistol');
  if (e.code === 'KeyR' && !player.reloading) reload();
});
document.addEventListener('keyup', e => keys[e.code] = false);

document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, pitch));
});

document.addEventListener('mousedown', e => {
  if (e.button === 0 && isLocked && player.alive) {
    shoot();
    canShootFlag = false;
  }
});
document.addEventListener('mouseup', e => {
  if (e.button === 0) canShootFlag = true;
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
  document.getElementById('blocker').style.display = isLocked ? 'none' : 'flex';
});

// --- GAME LOGIC ---
let gameStarted = false;
let round = 1;
let stepTimer = 0;
let recoilRecovery = 0;
let gunBob = 0;

function startGame() {
  initAudio();
  renderer.domElement.requestPointerLock();
  gameStarted = true;
  spawnEnemies();
  respawnPlayer();
}

function respawnPlayer() {
  player.health = 100;
  player.armor = 50;
  player.alive = true;
  player.reloading = false;
  const wp = weapons[player.weapon];
  player.ammo = wp.magSize;
  player.reserve = wp.reserve;
  camera.position.set(
    (Math.random() - 0.5) * 30,
    player.height,
    50 + (Math.random() - 0.5) * 10
  );
  yaw = Math.PI;
  pitch = 0;
  document.getElementById('death-screen').style.display = 'none';
}

function switchWeapon(name) {
  if (player.weapon === name || player.reloading) return;
  player.weapon = name;
  const wp = weapons[name];
  player.ammo = wp.magSize;
  player.reserve = wp.reserve;
  player.reloading = false;

  akGroup.visible = name === 'ak47';
  pistolGroup.visible = name === 'pistol';

  document.getElementById('weapon-name').textContent = wp.name;
  updateHUD();
}

function reload() {
  const wp = weapons[player.weapon];
  if (player.ammo >= wp.magSize || player.reserve <= 0) return;
  player.reloading = true;
  player.reloadStart = Date.now();
  playSound('reload');

  setTimeout(() => {
    if (!player.alive) return;
    const needed = wp.magSize - player.ammo;
    const available = Math.min(needed, player.reserve);
    player.ammo += available;
    player.reserve -= available;
    player.reloading = false;
    updateHUD();
  }, wp.reloadTime);
}

function shoot() {
  if (!player.alive || player.reloading) return;
  const wp = weapons[player.weapon];
  const now = Date.now();

  if (now - player.lastShot < wp.fireRate) return;
  if (player.ammo <= 0) { reload(); return; }

  player.lastShot = now;
  player.ammo--;
  playSound(wp.sound);

  // Muzzle flash
  muzzleFlash.material.opacity = 1;
  setTimeout(() => muzzleFlash.material.opacity = 0, 50);

  // Recoil
  pitch += wp.recoil * (0.8 + Math.random() * 0.4);
  yaw += (Math.random() - 0.5) * wp.recoil * 0.5;
  recoilRecovery = wp.recoil;

  // Gun kick animation
  gunGroup.position.z = -0.42;

  // Raycasting for hit detection
  const spread = wp.spread * (keys['ShiftLeft'] ? 1.5 : 1);
  const dir = new THREE.Vector3(
    (Math.random() - 0.5) * spread,
    (Math.random() - 0.5) * spread,
    -1
  );
  dir.applyQuaternion(camera.quaternion).normalize();

  const raycaster = new THREE.Raycaster(camera.position.clone(), dir, 0, 200);

  // Check enemy hits
  let hitEnemy = false;
  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    const intersects = raycaster.intersectObjects(enemy.mesh.children, true);
    if (intersects.length > 0) {
      const hitPoint = intersects[0].point;

      // Headshot detection
      const headY = enemy.mesh.position.y + 1.7;
      const isHeadshot = hitPoint.y > headY - 0.3;
      const dmg = isHeadshot ? wp.damage * 3 : wp.damage;

      enemy.health -= dmg;
      enemy.state = 'chase';

      createParticles(hitPoint, isHeadshot ? 0xff0000 : 0xcc4444, isHeadshot ? 8 : 4);
      createBulletTrail(camera.position.clone(), hitPoint);

      // Hit marker
      const hm = document.getElementById('hit-marker');
      hm.style.opacity = 1;
      setTimeout(() => hm.style.opacity = 0, 100);
      playSound('hit');

      if (enemy.health <= 0) {
        enemy.alive = false;
        enemy.mesh.visible = false;
        player.kills++;
        playSound('kill');
        addKillFeed(isHeadshot);

        // Respawn enemy after delay
        setTimeout(() => {
          if (!gameStarted) return;
          enemy.mesh.position.set(
            enemySpawns[enemy.spawnIndex % enemySpawns.length].x + (Math.random()-0.5)*10,
            0,
            enemySpawns[enemy.spawnIndex % enemySpawns.length].z + (Math.random()-0.5)*10
          );
          enemy.health = 100;
          enemy.alive = true;
          enemy.mesh.visible = true;
          enemy.state = 'patrol';
        }, 4000);

        checkRound();
      }
      hitEnemy = true;
      break;
    }
  }

  // Bullet impact on walls
  if (!hitEnemy) {
    const wallMeshes = mapWalls.map(w => w.mesh);
    const intersects = raycaster.intersectObjects(wallMeshes);
    if (intersects.length > 0) {
      createParticles(intersects[0].point, 0x999999, 3);
      createBulletTrail(camera.position.clone(), intersects[0].point);
    }
  }

  updateHUD();
}

function addKillFeed(headshot) {
  const feed = document.getElementById('kill-feed');
  const entry = document.createElement('div');
  entry.className = 'kill-entry';
  entry.innerHTML = `You <span style="color:#ff6600">${headshot ? '⊕ HEADSHOT' : '→'}</span> Enemy`;
  feed.appendChild(entry);
  setTimeout(() => entry.remove(), 4000);
}

function checkRound() {
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0) {
    round++;
    const rd = document.getElementById('round-display');
    rd.textContent = `ROUND ${round}`;
    rd.style.opacity = 1;
    setTimeout(() => rd.style.opacity = 0, 2000);

    setTimeout(() => spawnEnemies(), 3000);
  }
}

function playerTakeDamage(amount) {
  if (!player.alive) return;

  // Armor absorbs some damage
  if (player.armor > 0) {
    const armorDmg = Math.min(amount * 0.6, player.armor);
    player.armor -= armorDmg;
    amount -= armorDmg * 0.5;
  }

  player.health -= Math.round(amount);
  playSound('damage');

  // Damage overlay
  const overlay = document.getElementById('damage-overlay');
  overlay.style.opacity = 0.6;
  setTimeout(() => overlay.style.opacity = 0, 300);

  if (player.health <= 0) {
    player.health = 0;
    player.alive = false;
    player.deaths++;
    document.getElementById('death-screen').style.display = 'flex';

    setTimeout(() => respawnPlayer(), 3000);
  }
  updateHUD();
}

// --- COLLISION DETECTION ---
function checkCollision(x, z, radius) {
  for (const wall of mapWalls) {
    const wx = wall.mesh.position.x;
    const wz = wall.mesh.position.z;
    const hw = wall.hw + radius;
    const hd = wall.hd + radius;

    if (x > wx - hw && x < wx + hw && z > wz - hd && z < wz + hd) {
      return true;
    }
  }
  return false;
}

function checkLineOfSight(from, to) {
  const dir = new THREE.Vector3().subVectors(to, from).normalize();
  const dist = from.distanceTo(to);
  const raycaster = new THREE.Raycaster(from, dir, 0, dist);
  const wallMeshes = mapWalls.map(w => w.mesh);
  const intersects = raycaster.intersectObjects(wallMeshes);
  return intersects.length === 0;
}

// --- ENEMY AI ---
function updateEnemies(delta) {
  const playerPos = camera.position.clone();
  playerPos.y = 0;

  for (const enemy of enemies) {
    if (!enemy.alive) continue;

    const ePos = enemy.mesh.position;
    const distToPlayer = ePos.distanceTo(playerPos);
    const eyePos = new THREE.Vector3(ePos.x, 1.5, ePos.z);
    const playerEye = new THREE.Vector3(playerPos.x, player.height, playerPos.z);
    const canSee = checkLineOfSight(eyePos, playerEye);

    // State transitions
    if (canSee && distToPlayer < enemy.detectionRange && player.alive) {
      enemy.state = distToPlayer < enemy.attackRange ? 'attack' : 'chase';
    } else if (enemy.state !== 'patrol') {
      if (!canSee || distToPlayer > enemy.detectionRange * 1.5) {
        enemy.state = 'patrol';
      }
    }

    // Face player when chasing/attacking
    if (enemy.state === 'chase' || enemy.state === 'attack') {
      const angle = Math.atan2(playerPos.x - ePos.x, playerPos.z - ePos.z);
      enemy.mesh.rotation.y = angle;
    }

    // Movement
    let moveX = 0, moveZ = 0;

    if (enemy.state === 'patrol') {
      const dx = enemy.patrolTarget.x - ePos.x;
      const dz = enemy.patrolTarget.z - ePos.z;
      const patrolDist = Math.sqrt(dx*dx + dz*dz);

      if (patrolDist < 2) {
        enemy.patrolTarget.set(
          ePos.x + (Math.random() - 0.5) * 30,
          0,
          ePos.z + (Math.random() - 0.5) * 30
        );
        enemy.patrolTarget.x = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, enemy.patrolTarget.x));
        enemy.patrolTarget.z = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, enemy.patrolTarget.z));
      }

      moveX = (dx / patrolDist) * enemy.speed * 0.5;
      moveZ = (dz / patrolDist) * enemy.speed * 0.5;

      const patrolAngle = Math.atan2(dx, dz);
      enemy.mesh.rotation.y = patrolAngle;

    } else if (enemy.state === 'chase') {
      const dx = playerPos.x - ePos.x;
      const dz = playerPos.z - ePos.z;
      const d = Math.sqrt(dx*dx + dz*dz);
      moveX = (dx / d) * enemy.speed;
      moveZ = (dz / d) * enemy.speed;

    } else if (enemy.state === 'attack') {
      // Strafe while shooting
      const angle = Math.atan2(playerPos.x - ePos.x, playerPos.z - ePos.z);
      const strafeAngle = angle + Math.PI/2 + Math.sin(Date.now() * 0.002) * 0.5;
      moveX = Math.sin(strafeAngle) * enemy.speed * 0.4;
      moveZ = Math.cos(strafeAngle) * enemy.speed * 0.4;

      // Shoot at player
      const now = Date.now();
      if (now - enemy.lastShot > enemy.shootInterval && canSee) {
        enemy.lastShot = now;

        // Accuracy decreases with distance
        const accuracy = Math.max(0.5, 1 - distToPlayer / 50);
        if (Math.random() < accuracy * 0.4) {
          playerTakeDamage(8 + Math.random() * 7);
        }

        // Enemy muzzle flash
        createParticles(
          new THREE.Vector3(ePos.x, 1.2, ePos.z),
          0xffaa00, 2
        );
      }
    }

    // Apply movement with collision
    const newX = ePos.x + moveX;
    const newZ = ePos.z + moveZ;
    if (!checkCollision(newX, ePos.z, 0.5)) ePos.x = newX;
    if (!checkCollision(ePos.x, newZ, 0.5)) ePos.z = newZ;

    // Keep in bounds
    ePos.x = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, ePos.x));
    ePos.z = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, ePos.z));

    // Walking animation
    if (enemy.state === 'chase' || enemy.state === 'patrol') {
      const walkCycle = Math.sin(Date.now() * 0.01) * 0.38;
      if (enemy.leftLeg)  enemy.leftLeg.rotation.x  =  walkCycle;
      if (enemy.rightLeg) enemy.rightLeg.rotation.x = -walkCycle;
    }
  }
}

// --- MINIMAP ---
function drawMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const scale = w / (MAP_SIZE * 2);

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, w, h);

  // Draw walls
  ctx.fillStyle = 'rgba(150,140,130,0.6)';
  for (const wall of mapWalls) {
    const x = (wall.mesh.position.x + MAP_SIZE) * scale;
    const z = (wall.mesh.position.z + MAP_SIZE) * scale;
    const ww = wall.hw * 2 * scale;
    const wd = wall.hd * 2 * scale;
    ctx.fillRect(x - ww/2, z - wd/2, ww, wd);
  }

  // Draw enemies
  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    const ex = (enemy.mesh.position.x + MAP_SIZE) * scale;
    const ez = (enemy.mesh.position.z + MAP_SIZE) * scale;
    ctx.fillStyle = enemy.state === 'attack' ? '#ff4444' : '#ff8844';
    ctx.beginPath();
    ctx.arc(ex, ez, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw player
  const px = (camera.position.x + MAP_SIZE) * scale;
  const pz = (camera.position.z + MAP_SIZE) * scale;
  ctx.fillStyle = '#44ff44';
  ctx.beginPath();
  ctx.arc(px, pz, 3, 0, Math.PI * 2);
  ctx.fill();

  // Player direction
  ctx.strokeStyle = '#44ff44';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(px, pz);
  ctx.lineTo(px + Math.sin(yaw) * -8, pz + Math.cos(yaw) * -8);
  ctx.stroke();
}

// --- HUD UPDATE ---
function updateHUD() {
  document.getElementById('health-fill').style.width = player.health + '%';
  document.getElementById('health-text').textContent = Math.max(0, player.health);
  document.getElementById('armor-fill').style.width = player.armor + '%';
  document.getElementById('armor-text').textContent = Math.max(0, Math.round(player.armor));
  document.getElementById('ammo-current').textContent = player.ammo;
  document.getElementById('ammo-reserve').textContent = player.reserve;
  document.getElementById('kills').textContent = player.kills;
  document.getElementById('deaths').textContent = player.deaths;
  document.getElementById('round').textContent = round;

  // Health color
  const hf = document.getElementById('health-fill');
  if (player.health > 50) hf.style.background = 'linear-gradient(90deg, #00ff44, #44ff88)';
  else if (player.health > 25) hf.style.background = 'linear-gradient(90deg, #ffaa00, #ffcc44)';
  else hf.style.background = 'linear-gradient(90deg, #ff2200, #ff4444)';
}

// --- GAME LOOP ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  if (!gameStarted || !isLocked) { renderer.render(scene, camera); return; }

  const delta = clock.getDelta();
  const now = Date.now();

  if (player.alive) {
    // Camera rotation
    camera.rotation.set(0, 0, 0);
    camera.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), yaw);
    camera.rotateOnAxis(new THREE.Vector3(1, 0, 0), pitch);

    // Movement
    const speed = keys['ShiftLeft'] ? player.sprintSpeed : player.speed;
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    forward.y = 0;
    forward.normalize();
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    right.y = 0;
    right.normalize();

    let moved = false;
    let moveX = camera.position.x;
    let moveZ = camera.position.z;

    if (keys['KeyW']) { moveX += forward.x * speed; moveZ += forward.z * speed; moved = true; }
    if (keys['KeyS']) { moveX -= forward.x * speed; moveZ -= forward.z * speed; moved = true; }
    if (keys['KeyA']) { moveX -= right.x * speed; moveZ -= right.z * speed; moved = true; }
    if (keys['KeyD']) { moveX += right.x * speed; moveZ += right.z * speed; moved = true; }

    // Apply movement with collision
    if (!checkCollision(moveX, camera.position.z, 0.4)) camera.position.x = moveX;
    if (!checkCollision(camera.position.x, moveZ, 0.4)) camera.position.z = moveZ;

    // Bounds
    camera.position.x = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, camera.position.x));
    camera.position.z = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, camera.position.z));

    // Jump
    if (keys['Space'] && player.onGround) {
      player.velocityY = player.jumpForce;
      player.onGround = false;
    }

    player.velocityY -= 0.008;
    camera.position.y += player.velocityY;

    if (camera.position.y <= player.height) {
      camera.position.y = player.height;
      player.velocityY = 0;
      player.onGround = true;
    }

    // Footstep sounds
    if (moved && player.onGround) {
      stepTimer += delta;
      const stepInterval = keys['ShiftLeft'] ? 0.3 : 0.45;
      if (stepTimer > stepInterval) {
        stepTimer = 0;
        playSound('step');
      }
    }

    // Auto-fire for automatic weapons
    const wp = weapons[player.weapon];
    if (wp.auto && !canShootFlag && player.alive && !player.reloading) {
      shoot();
    }

    // Recoil recovery
    if (recoilRecovery > 0) {
      pitch -= recoilRecovery * 0.05;
      recoilRecovery *= 0.9;
      if (recoilRecovery < 0.001) recoilRecovery = 0;
    }

    // Gun bob
    if (moved && player.onGround) {
      gunBob += delta * (keys['ShiftLeft'] ? 12 : 8);
      gunGroup.position.y = -0.28 + Math.sin(gunBob) * 0.01;
      gunGroup.position.x = 0.3 + Math.cos(gunBob * 0.5) * 0.005;
    }

    // Gun position recovery
    gunGroup.position.z += (-0.5 - gunGroup.position.z) * 0.15;

    // Reload animation
    if (player.reloading) {
      const progress = (now - player.reloadStart) / weapons[player.weapon].reloadTime;
      gunGroup.rotation.x = Math.sin(progress * Math.PI) * 0.5;
    } else {
      gunGroup.rotation.x *= 0.9;
    }
  }

  // Update enemies
  updateEnemies(delta);

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= delta * (p.isTrail ? 3 : 2);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      if (p.mesh.geometry) p.mesh.geometry.dispose();
      if (p.mesh.material) p.mesh.material.dispose();
      particles.splice(i, 1);
    } else {
      if (!p.isTrail) {
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.mesh.position.z += p.vz;
        p.vy -= 0.005;
      }
      p.mesh.material.opacity = p.life;
    }
  }

  // Minimap
  drawMinimap();
  updateHUD();

  renderer.render(scene, camera);
}

animate();

// Handle window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
